name: Test hardened actions
on:
  workflow_dispatch:
env:
  IMAGE_NAME: 'web/smartweb/mutual'
  REGISTRY_URL: ${{ secrets.HARBOR_URL }}

jobs:
  tag:
    runs-on: gha-runners-smartweb
    steps:
      - name: Test tag-notify
        uses: IMIO/gha/tag-notify@harden_security_bis
        with:
          IMAGE_NAME: 'web/smartweb/mutual'
          IMAGE_TAG: 'staging'
          NEW_IMAGE_TAGS: |
            testtag
          REGISTRY_URL: ${{ secrets.HARBOR_URL }}
          REGISTRY_USERNAME: ${{ secrets.SMARTWEB_HARBOR_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.SMARTWEB_HARBOR_PASSWORD }}
          MATTERMOST_WEBHOOK_URL: ${{ secrets.SMARTWEB_MATTERMOST_WEBHOOK_URL }}
  build-push:
    runs-on: gha-runners-smartweb
    steps:
      - name: Build tags
        run: |
          {
            echo 'IMAGE_TAGS<<EOF'
            echo '${{ env.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:testharden'
            echo '${{ env.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:testharden-${{ github.run_number }}'
            echo EOF
          } >> $GITHUB_ENV
      - name: Test build-push-notify
        uses: IMIO/gha/build-push-notify@harden_security_bis
        with:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_TAGS: ${{ env.IMAGE_TAGS }}
          REGISTRY_URL: ${{ env.REGISTRY_URL}}
          REGISTRY_USERNAME: ${{ secrets.SMARTWEB_HARBOR_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.SMARTWEB_HARBOR_PASSWORD }}
          MATTERMOST_WEBHOOK_URL: ${{ secrets.SMARTWEB_MATTERMOST_WEBHOOK_URL }}
  deploy:
    runs-on: gha-runners-smartweb
    needs: build-push
    steps:
      - name: Test rundeck-notify
        uses: IMIO/gha/rundeck-notify@harden_security_bis
        with:
          RUNDECK_URL: ${{ secrets.RUNDECK_URL }}
          RUNDECK_TOKEN: ${{ secrets.SMARTWEB_RUNDECK_TOKEN }}
          RUNDECK_JOB_ID: ${{ secrets.RUNDECK_DEPLOY_STAGING_JOB_ID }}
          RUNDECK_PARAMETERS: '-X POST'
          MATTERMOST_WEBHOOK_URL: ${{ secrets.SMARTWEB_MATTERMOST_WEBHOOK_URL }}
