
<blobstorage source>
  blob-dir var/migrate/blobstorage
  <filestorage>
    path var/migrate/filestorage/Data.fs
  </filestorage>
</blobstorage>

<relstorage destination>
  # ZODB Cache Dir
  shared-blob-dir true
  blob-dir var/blobstorage
  blob-cache-size 10mb
  <postgresql>
    dsn dbname='$(RELSTORAGE_DB)' user='$(RELSTORAGE_USER)' host='$(RELSTORAGE_HOSTNAME)' port='$(RELSTORAGE_PORT)' password='$(RELSTORAGE_PASSWORD)'
  </postgresql>
</relstorage>